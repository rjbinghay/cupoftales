{% extends 'stories/base.html' %}
{% block title %}Reset password — Cup of Tales{% endblock %}

{% block content %}
<div class="form-card">
    <h1 class="form-card__title">Reset your password</h1>
    <p class="form-card__subtitle">Enter your email and we'll send you a reset link.</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-field">
            <label for="id_email">Email address</label>
            <input type="email" name="email" id="id_email" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Send reset link</button>
    </form>
</div>
{% endblock %}
