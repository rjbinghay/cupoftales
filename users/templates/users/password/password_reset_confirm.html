{% extends 'stories/base.html' %}
{% block title %}Set new password — Cup of Tales{% endblock %}

{% block content %}
<div class="form-card">
    <h1 class="form-card__title">Set a new password</h1>

    {% if validlink %}
    <form method="post">
        {% csrf_token %}
        <div class="form-field">
            <label for="id_new_password1">New password</label>
            <input type="password" name="new_password1" id="id_new_password1" required class="form-control">
        </div>
        <div class="form-field">
            <label for="id_new_password2">Confirm new password</label>
            <input type="password" name="new_password2" id="id_new_password2" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Set password</button>
    </form>
    {% else %}
    <p style="color: var(--color-ink-muted);">
        This reset link is invalid or has expired. 
        <a href="{% url 'password_reset' %}" style="color: var(--color-accent);">Request a new one.</a>
    </p>
    {% endif %}
</div>
{% endblock %}
